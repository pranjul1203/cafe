        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .transition-all {
            transition: all 0.3s ease;
        }

        .transition-colors {
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        .transition-transform {
            transition: transform 0.3s ease;
        }

        .transition-shadow {
            transition: box-shadow 0.3s ease;
        }

        .transition-opacity {
            transition: opacity 0.3s ease;
        }

        .hover\:scale-105:hover {
            transform: scale(1.05);
        }

        .hover\:scale-110:hover {
            transform: scale(1.10);
        }

        .group:hover .group-hover\:scale-110 {
            transform: scale(1.10);
        }

        .backdrop-blur-sm {
            backdrop-filter: blur(8px);
        }

        .hidden {
            display: none;
        }

        @media (min-width: 640px) {
            .sm\:flex {
                display: flex;
            }
        }

        @media (min-width: 768px) {
            .md\:hidden {
                display: none;
            }
            .md\:flex {
                display: flex;
            }
            .md\:grid-cols-2 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .md\:w-96 {
                width: 24rem;
            }
            .md\:h-auto {
                height: auto;
            }
            .md\:max-h-\[80vh\] {
                max-height: 80vh;
            }
            .md\:rounded-l-2xl {
                border-top-left-radius: 1rem;
                border-bottom-left-radius: 1rem;
            }
            .md\:rounded-r-none {
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
            }
            .md\:items-center {
                align-items: center;
            }
            .md\:text-7xl {
                font-size: 4.5rem;
                line-height: 1;
            }
            .md\:text-2xl {
                font-size: 1.5rem;
                line-height: 2rem;
            }
        }

        @media (min-width: 1024px) {
            .lg\:grid-cols-3 {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .lg\:grid-cols-4 {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        .max-h-\[90vh\] {
            max-height: 90vh;
        }

        .aspect-square {
            aspect-ratio: 1 / 1;
        }

        .aspect-video {
            aspect-ratio: 16 / 9;
        }

        img.object-cover {
            object-fit: cover;
        }

        .overflow-hidden {
            overflow: hidden;
        }

        .overflow-y-auto {
            overflow-y: auto;
        }

        .z-10 {
            z-index: 10;
        }

        .z-20 {
            z-index: 20;
        }

        .z-40 {
            z-index: 40;
        }

        .z-50 {
            z-index: 50;
        }

        .inset-0 {
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;

        // Helper functions
        function scrollToSection(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
                state.isMenuOpen = false;
                render();
            }
        }

        function addToCart(item, category) {
            const existingItem = state.cartItems.find(i => i.id === item.id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                state.cartItems.push({ ...item, quantity: 1, category });
            }
            state.isCartOpen = true;
            render();
        }

        function removeFromCart(id) {
            state.cartItems = state.cartItems.filter(item => item.id !== id);
            render();
        }

        function updateQuantity(id, quantity) {
            if (quantity === 0) {
                removeFromCart(id);
            } else {
                const item = state.cartItems.find(i => i.id === id);
                if (item) {
                    item.quantity = quantity;
                }
            }
            render();
        }

        function getCartTotal() {
            return state.cartItems.reduce((total, item) => total + item.price * item.quantity, 0);
        }

        function getCartCount() {
            return state.cartItems.reduce((count, item) => count + item.quantity, 0);
        }

        function handleTableSelect(tableName) {
            state.selectedTable = tableName;
            state.reservationForm.tableType = tableName;
            state.isReservationModalOpen = true;
            render();
        }

            state.isReservationModalOpen = false;
            state.reservationForm = {
                name: '',
                phone: '',
                email: '',
                date: '',
                time: '',
                guests: '',
                requests: '',
                tableType: ''
            };
            render();
        }

        function handleCheckout(e) {
            e.preventDefault();
            const total = getCartTotal() + (state.orderForm.deliveryType === 'delivery' ? 3.99 : 0);
            alert(`Order placed!\nName: ${state.orderForm.name}\nType: ${state.orderForm.deliveryType}\nTotal: $${total.toFixed(2)}\nItems: ${getCartCount()}`);

            state.cartItems = [];
            state.orderForm = {
                name: '',
                phone: '',
                deliveryType: 'pickup',
                address: ''
            };
            render();
        }

                                    class="p-2 rounded-lg ${isCafe ? 'hover:bg-stone-100' : 'hover:bg-zinc-800'}"
                                >
                                    <svg class="w-6 h-6 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>

                            <!-- Cart Items -->
                            <div class="flex-1 overflow-y-auto p-4">
                                ${state.cartItems.length === 0 ? `
                                    <p class="text-center py-8 ${isCafe ? 'text-stone-600' : 'text-zinc-400'}">
                                        Your cart is empty
                                    </p>
                                ` : `
                                    <div class="space-y-4">
                                        ${state.cartItems.map(item => `
                                            <div class="p-3 rounded-lg ${
                                                isCafe ? 'bg-stone-50' : 'bg-zinc-800'
                                            }">
                                                <div class="flex justify-between items-start mb-2">
                                                    <div class="flex-1">
                                                        <h4 class="${isCafe ? 'text-stone-900' : 'text-zinc-100'}">
                                                            ${item.name}
                                                        </h4>
                                                        <p class="text-sm ${isCafe ? 'text-stone-600' : 'text-zinc-400'}">
                                                            ${item.category}
                                                        </p>
                                                    </div>
                                                    <button
                                                        onclick="removeFromCart('${item.id}')"
                                                        class="p-1 ${isCafe ? 'text-red-600 hover:bg-red-50' : 'text-red-400 hover:bg-red-900/20'} rounded"
                                                    >
                                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                        </svg>
                                                    </button>
                                                </div>
                                                <div class="flex justify-between items-center">
                                                    <div class="flex items-center space-x-2">
                                                        <button
                                                            onclick="updateQuantity('${item.id}', ${item.quantity - 1})"
                                                            class="w-8 h-8 rounded-full ${
                                                                isCafe ? 'bg-stone-200 hover:bg-stone-300' : 'bg-zinc-700 hover:bg-zinc-600'
                                                            }"
                                                        >
                                                            -
                                                        </button>
                                                        <span class="${isCafe ? 'text-stone-900' : 'text-zinc-100'}">
                                                            ${item.quantity}
                                                        </span>
                                                        <button
                                                            onclick="updateQuantity('${item.id}', ${item.quantity + 1})"
                                                            class="w-8 h-8 rounded-full ${
                                                                isCafe ? 'bg-stone-200 hover:bg-stone-300' : 'bg-zinc-700 hover:bg-zinc-600'
                                                            }"
                                                        >
                                                            +
                                                        </button>
                                                    </div>
                                                    <span class="${isCafe ? 'text-amber-700' : 'text-amber-400'}">
                                                        $${(item.price * item.quantity).toFixed(2)}
                                                    </span>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>

                            <!-- Cart Footer -->
                            ${state.cartItems.length > 0 ? `
                            <div class="p-4 border-t ${isCafe ? 'border-stone-200' : 'border-zinc-700'}">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-lg ${isCafe ? 'text-stone-900' : 'text-zinc-100'}">
                                        Total:
                                    </span>
                                    <span class="text-2xl font-serif ${isCafe ? 'text-amber-900' : 'text-amber-400'}">
                                        $${cartTotal.toFixed(2)}
                                    </span>
                                </div>
                                <button
                                    onclick="state.isCartOpen = false; state.isCheckoutModalOpen = true; render();"
                                    class="w-full py-3 rounded-lg transition-colors ${
                                        isCafe
                                            ? 'bg-amber-700 hover:bg-amber-800 text-white'
                                            : 'bg-amber-500 hover:bg-amber-600 text-black'
                                    }"
                                >
                                    Proceed to Checkout
                                </button>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Reservation Modal -->
                    ${state.isReservationModalOpen ? `
                    <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                        <div class="w-full max-w-md rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto ${
                            isCafe ? 'bg-white' : 'bg-zinc-900'
                        }">
                            <div class="p-6 border-b ${isCafe ? 'border-stone-200' : 'border-zinc-700'}">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-2xl font-serif ${isCafe ? 'text-amber-900' : 'text-amber-400'}">
                                        Book Your Table
                                    </h3>
                                    <button
                                        onclick="state.isReservationModalOpen = false; render();"
                                        class="p-2 rounded-lg ${isCafe ? 'hover:bg-stone-100' : 'hover:bg-zinc-800'}"
                                    >
                                        <svg class="w-6 h-6 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <form id="reservationForm" class="p-6 space-y-4">
                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Table Type
                                    </label>
                                    <input
                                        type="text"
                                        value="${state.reservationForm.tableType}"
                                        readonly
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-stone-50'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Name *
                                    </label>
                                    <input
                                        type="text"
                                        required
                                        id="res_name"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Phone Number *
                                    </label>
                                    <input
                                        type="tel"
                                        required
                                        id="res_phone"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Email *
                                    </label>
                                    <input
                                        type="email"
                                        required
                                        id="res_email"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                            Date *
                                        </label>
                                        <input
                                            type="date"
                                            required
                                            id="res_date"
                                            class="w-full px-4 py-2 rounded-lg border ${
                                                isCafe
                                                    ? 'border-stone-300 bg-white'
                                                    : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                            }"
                                        />
                                    </div>

                                    <div>
                                        <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                            Time *
                                        </label>
                                        <input
                                            type="time"
                                            required
                                            id="res_time"
                                            class="w-full px-4 py-2 rounded-lg border ${
                                                isCafe
                                                    ? 'border-stone-300 bg-white'
                                                    : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                            }"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Number of Guests *
                                    </label>
                                    <input
                                        type="number"
                                        min="1"
                                        required
                                        id="res_guests"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Special Requests
                                    </label>
                                    <textarea
                                        rows="3"
                                        id="res_requests"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                        placeholder="Any dietary restrictions or special occasions?"
                                    ></textarea>
                                </div>

                                <button
                                    type="submit"
                                    class="w-full py-3 rounded-lg transition-colors ${
                                        isCafe
                                            ? 'bg-amber-700 hover:bg-amber-800 text-white'
                                            : 'bg-amber-500 hover:bg-amber-600 text-black'
                                    }"
                                >
                                    Confirm Reservation
                                </button>
                            </form>
                        </div>
                    </div>
                    ` : ''}

                    <!-- Checkout Modal -->
                    ${state.isCheckoutModalOpen ? `
                    <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                        <div class="w-full max-w-md rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto ${
                            isCafe ? 'bg-white' : 'bg-zinc-900'
                        }">
                            <div class="p-6 border-b ${isCafe ? 'border-stone-200' : 'border-zinc-700'}">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-2xl font-serif ${isCafe ? 'text-amber-900' : 'text-amber-400'}">
                                        Checkout
                                    </h3>
                                    <button
                                        onclick="state.isCheckoutModalOpen = false; render();"
                                        class="p-2 rounded-lg ${isCafe ? 'hover:bg-stone-100' : 'hover:bg-zinc-800'}"
                                    >
                                        <svg class="w-6 h-6 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <form id="checkoutForm" class="p-6 space-y-4">
                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Name *
                                    </label>
                                    <input
                                        type="text"
                                        required
                                        id="order_name"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Phone Number *
                                    </label>
                                    <input
                                        type="tel"
                                        required
                                        id="order_phone"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                    />
                                </div>

                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Order Type *
                                    </label>
                                    <div class="flex space-x-4">
                                        <label class="flex items-center">
                                            <input
                                                type="radio"
                                                name="deliveryType"
                                                value="pickup"
                                                checked
                                                onchange="state.orderForm.deliveryType = 'pickup'; render();"
                                                class="mr-2"
                                            />
                                            <span class="${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                                Pickup
                                            </span>
                                        </label>
                                        <label class="flex items-center">
                                            <input
                                                type="radio"
                                                name="deliveryType"
                                                value="delivery"
                                                onchange="state.orderForm.deliveryType = 'delivery'; render();"
                                                class="mr-2"
                                            />
                                            <span class="${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                                Delivery
                                            </span>
                                        </label>
                                    </div>
                                </div>

                                ${state.orderForm.deliveryType === 'delivery' ? `
                                <div>
                                    <label class="block mb-2 ${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                        Delivery Address *
                                    </label>
                                    <textarea
                                        rows="3"
                                        required
                                        id="order_address"
                                        class="w-full px-4 py-2 rounded-lg border ${
                                            isCafe
                                                ? 'border-stone-300 bg-white'
                                                : 'border-zinc-700 bg-zinc-800 text-zinc-100'
                                        }"
                                        placeholder="Enter your delivery address"
                                    ></textarea>
                                </div>
                                ` : ''}

                                <div class="p-4 rounded-lg ${isCafe ? 'bg-stone-50' : 'bg-zinc-800'}">
                                    <div class="flex justify-between mb-2">
                                        <span class="${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                            Subtotal (${cartCount} items):
                                        </span>
                                        <span class="${isCafe ? 'text-stone-900' : 'text-zinc-100'}">
                                            $${cartTotal.toFixed(2)}
                                        </span>
                                    </div>
                                    ${state.orderForm.deliveryType === 'delivery' ? `
                                    <div class="flex justify-between mb-2">
                                        <span class="${isCafe ? 'text-stone-700' : 'text-zinc-300'}">
                                            Delivery Fee:
                                        </span>
                                        <span class="${isCafe ? 'text-stone-900' : 'text-zinc-100'}">
                                            $3.99
                                        </span>
                                    </div>
                                    ` : ''}
                                    <div class="flex justify-between pt-2 border-t ${
                                        isCafe ? 'border-stone-200' : 'border-zinc-700'
                                    }">
                                        <span class="text-lg ${isCafe ? 'text-stone-900' : 'text-zinc-100'}">
                                            Total:
                                        </span>
                                        <span class="text-xl font-serif ${isCafe ? 'text-amber-900' : 'text-amber-400'}">
                                            $${(cartTotal + (state.orderForm.deliveryType === 'delivery' ? 3.99 : 0)).toFixed(2)}
                                        </span>
                                    </div>
                                </div>

                                <button
                                    type="submit"
                                    class="w-full py-3 rounded-lg transition-colors ${
                                        isCafe
                                            ? 'bg-amber-700 hover:bg-amber-800 text-white'
                                            : 'bg-amber-500 hover:bg-amber-600 text-black'
                                    }"
                                >
                                    Place Order
                                </button>
                            </form>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('app').innerHTML = html;

            // Add form event listeners after rendering
            if (state.isReservationModalOpen) {
                document.getElementById('reservationForm').addEventListener('submit', handleReservationSubmit);
            }

            if (state.isCheckoutModalOpen) {
                document.getElementById('checkoutForm').addEventListener('submit', handleCheckout);
            }
        }

        // Initial render
        render();
    </script>
</body>
</html>
